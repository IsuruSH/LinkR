# Minimal L7 load balancer, used only to demonstrate that the backend is
# stateless. Production would use whatever the platform already provides.
events { worker_connections 1024; }

http {
    access_log off;

    server {
        listen 8080;

        location / {
            # Docker's embedded DNS returns one A record per replica of the
            # `backend` service. Resolving through a *variable* forces nginx to
            # re-resolve on every request instead of caching the first address
            # it saw at startup -- which is the classic reason a "load balanced"
            # nginx quietly pins every request to one container.
            resolver 127.0.0.11 valid=1s ipv6=off;
            set $backend_upstream backend;

            proxy_pass http://$backend_upstream:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
