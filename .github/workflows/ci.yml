name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref, so a rapid push sequence does not queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (vet, lint, test -race)
    runs-on: ubuntu-latest

    # Real dependencies, wired with the same URLs the app uses, so the
    # integration tests exercise actual SQL and Redis rather than a fake.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkr
          POSTGRES_PASSWORD: linkr_dev_password
          POSTGRES_DB: linkr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U linkr -d linkr"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DATABASE_URL: postgres://linkr:linkr_dev_password@localhost:5432/linkr?sslmode=disable
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: gofmt
        working-directory: backend
        run: |
          # internal/db is sqlc-generated; everything else must be gofmt-clean.
          unformatted=$(gofmt -l . | grep -v '^internal/db/' || true)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: golangci-lint
        # Run the pinned image directly rather than via the action: it removes
        # the action-version/binary-version compatibility matrix, and this exact
        # image is verified locally. A v1.x binary (built with go1.24) refuses a
        # go1.25 module, which is why this is v2.
        run: |
          docker run --rm -v "${{ github.workspace }}/backend:/app" -w /app \
            golangci/golangci-lint:v2.12.2 golangci-lint run --timeout 5m

      - name: Unit tests (race)
        working-directory: backend
        run: go test -race ./...

      - name: Integration tests (race)
        working-directory: backend
        run: go test -race -tags=integration ./tests/...

      - name: Build server
        working-directory: backend
        run: go build ./cmd/server

  sqlc:
    name: sqlc (no drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Regenerate from migrations + queries and fail if the committed code
      # differs. This is what makes "generated code is committed" trustworthy:
      # a migration edited without `make sqlc` cannot merge.
      - name: Regenerate
        run: docker run --rm -v "${{ github.workspace }}/backend:/src" -w /src sqlc/sqlc:1.29.0 generate

      - name: Check for drift
        run: |
          if ! git diff --exit-code backend/internal/db; then
            echo "internal/db is stale — run 'make sqlc' and commit the result."; exit 1
          fi

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  images:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # GHCR repository names must be lowercase; the owner may be mixed-case.
      - name: Compute image names
        id: img
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/$owner/linkr-backend"   >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/$owner/linkr-frontend" >> "$GITHUB_OUTPUT"

      # Push only on a real push to main. PRs still build both images (proving
      # they compile from a clean context) but never push — and a fork PR could
      # not authenticate anyway.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.img.outputs.backend }}:latest
            ${{ steps.img.outputs.backend }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NEXT_PUBLIC_API_URL is only read server-side (session.ts), never in the
      # browser bundle, so the image is environment-portable and the Dockerfile's
      # default arg is fine — no per-deployment rebuild.
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.img.outputs.frontend }}:latest
            ${{ steps.img.outputs.frontend }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
