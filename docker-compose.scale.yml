# Overlay that demonstrates horizontal scale:
#
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up --scale backend=3
#
# The base file publishes backend on a fixed host port, which three replicas
# cannot all bind. Here the publish is dropped and an nginx L7 balancer takes
# :8080 instead, round-robining across whatever replicas exist.
#
# Nothing in the application changes. That is the point: the backend keeps no
# per-process state, the cache is in Redis rather than in a local map, and
# migrations and the seed take Postgres advisory locks so N replicas booting at
# once means one applies and the rest no-op.

services:
  backend:
    # !reset clears the base file's list rather than appending to it.
    ports: !reset []

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      backend: {condition: service_healthy}
    networks: [linkr_net]

  frontend:
    environment:
      # The BFF proxy now talks to the balancer, not to one replica.
      BACKEND_INTERNAL_URL: http://lb:8080
    depends_on:
      lb: {condition: service_started}
