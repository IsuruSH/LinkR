# Linkr edge reverse proxy — single-host production, HTTPS.
#
# Mounted read-only at /etc/nginx/nginx.conf. Port 80 serves the ACME challenge
# and a health probe and redirects everything else to HTTPS; port 443 serves the
# app over TLS.
#
# Routing is by SPECIFICITY, not the naive "/api -> backend", because this app
# uses a BFF: the browser's /api/auth and /api/bff calls are Next.js route
# handlers in the FRONTEND, and only the backend serves the short-code redirects
# (/{code}) plus the infra probes.
#
# The certificate path is FIXED (/etc/letsencrypt/live/linkr/), because certbot
# is run with `--cert-name linkr`. That keeps the domain out of this file — it
# lives only in .env (DOMAIN) — so nothing here is hardcoded to one site.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging -----------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                      'xff="$http_x_forwarded_for" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;          # do not advertise the Nginx version
    client_max_body_size  2m;     # backend caps JSON at 1 MiB; reject bigger here

    # ---- gzip --------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript application/xml application/rss+xml image/svg+xml;

    # ---- WebSocket upgrade -------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---- Upstreams (dynamic, so replicas actually load-balance) ------------
    # The `resolve` parameter (nginx >= 1.27.3) re-resolves via Docker DNS and
    # round-robins across ALL replica IPs; a static `server` would pin to one.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend {
        zone frontend 64k;
        server frontend:3000 resolve;
    }
    upstream backend {
        zone backend 64k;
        server backend:8080 resolve;
    }

    # ---- Shared proxy config (inherited by the proxied locations on :443) ---
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        $connection_upgrade;
    proxy_connect_timeout  5s;
    proxy_read_timeout     60s;
    proxy_send_timeout     60s;

    # The Go backend sets its own security headers; strip them so the edge owns
    # exactly one copy (added per-server below).
    proxy_hide_header  X-Content-Type-Options;
    proxy_hide_header  X-Frame-Options;
    proxy_hide_header  Referrer-Policy;

    # ======================================================================
    # HTTP :80 — ACME challenge, health, and redirect to HTTPS
    # ======================================================================
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        # Nginx's own health, answered here (no upstream). The container
        # healthcheck hits this over :80, so it must not be redirected.
        location = /__nginx_health {
            access_log  off;
            add_header  Content-Type text/plain;
            return 200 "ok\n";
        }

        # Let's Encrypt HTTP-01 challenge — must stay on :80 and not redirect,
        # so certbot can validate and renew.
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        # Everything else goes to HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ======================================================================
    # HTTPS :443 — the application
    # ======================================================================
    server {
        listen       443 ssl;
        listen       [::]:443 ssl;
        http2        on;
        server_name  _;

        ssl_certificate      /etc/letsencrypt/live/linkr/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/linkr/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;

        # Security headers. HSTS is safe here because this is the TLS listener.
        # All four are defined together: adding any add_header drops inherited
        # ones, so they must live in the same block.
        add_header  Strict-Transport-Security  "max-age=63072000; includeSubDomains"  always;
        add_header  X-Content-Type-Options     "nosniff"                              always;
        add_header  X-Frame-Options            "DENY"                                 always;
        add_header  Referrer-Policy            "no-referrer"                          always;

        location = /__nginx_health {
            access_log  off;
            add_header  Content-Type text/plain;
            return 200 "ok\n";
        }

        # --- Frontend routes (win over the short-code regex below) ----------
        location = / {
            proxy_pass  http://frontend;
        }
        location = /login {
            proxy_pass  http://frontend;
        }
        location = /register {
            proxy_pass  http://frontend;
        }
        location ^~ /dashboard {
            proxy_pass  http://frontend;
        }
        location ^~ /api/ {          # Next BFF + auth route handlers
            proxy_pass  http://frontend;
        }
        location ^~ /_next/ {        # Next build assets, HMR websocket
            proxy_pass  http://frontend;
        }
        location ^~ /l/ {            # link-unavailable page
            proxy_pass  http://frontend;
        }

        # --- Backend: infra probes ------------------------------------------
        location = /healthz {
            proxy_pass  http://backend;
            access_log  off;
        }
        location = /readyz {
            proxy_pass  http://backend;
            access_log  off;
        }

        # --- Backend: short-code redirects ----------------------------------
        # One path segment of 3-32 code characters. Regex is tried only after the
        # exact/^~ frontend routes above, so /login etc. never reach here.
        location ~ "^/[A-Za-z0-9_-]{3,32}$" {
            proxy_pass  http://backend;
        }

        # --- Everything else -> frontend (deep app paths, static, favicon) --
        location / {
            proxy_pass  http://frontend;
        }
    }
}
