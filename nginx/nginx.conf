# Linkr edge reverse proxy — single-host production.
#
# Mounted read-only at /etc/nginx/nginx.conf. One file by request: events, http
# and the server block are all inline.
#
# Routing is by SPECIFICITY, not the naive "/api -> backend", because this app
# uses a BFF: the browser's /api/auth and /api/bff calls are Next.js route
# handlers in the FRONTEND, and only the backend serves the short-code redirects
# (/{code}) plus the infra probes. See README "Architecture & routing".

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging -----------------------------------------------------------
    # $remote_addr is the immediate peer (the real client today, since Nginx is
    # the edge). Behind a future ELB the true client is the left of xff.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                      'xff="$http_x_forwarded_for" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;          # do not advertise the Nginx version
    client_max_body_size  2m;     # backend caps JSON at 1 MiB; reject bigger here

    # ---- gzip --------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript application/xml application/rss+xml image/svg+xml;

    # ---- WebSocket upgrade -------------------------------------------------
    # "upgrade" when the client requested an Upgrade, else "close".
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---- Upstreams (dynamic, so replicas actually load-balance) ------------
    #
    # A plain `server frontend:3000;` resolves ONCE at startup and pins to a
    # single IP — so with `deploy: replicas: N` it would send every request to
    # one replica. The `resolve` parameter (open-source nginx >= 1.27.3) makes
    # nginx re-resolve via the Docker DNS resolver below and round-robin across
    # ALL replica IPs. It also means a recreated container is picked up
    # automatically within `valid=10s`, no reload required.
    resolver 127.0.0.11 valid=10s ipv6=off;   # Docker's embedded DNS

    upstream frontend {
        zone frontend 64k;
        server frontend:3000 resolve;
    }
    upstream backend {
        zone backend 64k;
        server backend:8080 resolve;
    }

    server {
        listen       80;
        listen       [::]:80;
        server_name  _;               # any host; no hardcoded domain or IP

        # --- Shared proxy config (inherited by every location below) --------
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_connect_timeout  5s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;

        # Security headers are owned here. Strip any upstream copies (the Go
        # backend sets its own) so responses carry exactly one of each.
        proxy_hide_header  X-Content-Type-Options;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Referrer-Policy;
        add_header  X-Content-Type-Options  "nosniff"      always;
        add_header  X-Frame-Options         "DENY"         always;
        add_header  Referrer-Policy         "no-referrer"  always;
        # HSTS belongs on HTTPS only — enable it in the 443 block once TLS is on.

        # --- Nginx's own health (answered here, no upstream) ----------------
        # The container healthcheck hits this. It must NOT proxy, so that Nginx
        # reports healthy based on itself, not on the frontend or backend being
        # up. Exact match, so it beats the short-code regex.
        location = /__nginx_health {
            access_log  off;
            add_header  Content-Type text/plain;
            return 200 "ok\n";
        }

        # --- ACME HTTP-01 challenge (future Let's Encrypt) ------------------
        # Kept above the app routes so certbot's files are never proxied.
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        # --- Frontend routes (win over the short-code regex below) ----------
        # These bare segments (/login, /register, /dashboard, /api, /_next, /l)
        # would otherwise match the short-code pattern, so they are pinned to the
        # frontend explicitly. Mirrors the backend's reserved-alias list.
        location = / {
            proxy_pass  http://frontend;
        }
        location = /login {
            proxy_pass  http://frontend;
        }
        location = /register {
            proxy_pass  http://frontend;
        }
        location ^~ /dashboard {
            proxy_pass  http://frontend;
        }
        location ^~ /api/ {          # Next BFF + auth route handlers
            proxy_pass  http://frontend;
        }
        location ^~ /_next/ {        # Next build assets, HMR websocket
            proxy_pass  http://frontend;
        }
        location ^~ /l/ {            # link-unavailable page
            proxy_pass  http://frontend;
        }

        # --- Backend: infra probes ------------------------------------------
        location = /healthz {
            proxy_pass  http://backend;
            access_log  off;         # health polling would flood the log
        }
        location = /readyz {
            proxy_pass  http://backend;
            access_log  off;
        }

        # --- Backend: short-code redirects ----------------------------------
        # One path segment of 3-32 code characters. Regex locations are tried
        # only after the exact/^~ frontend routes above, so /login etc. never
        # reach here; a genuine code like /gh-repo does.
        location ~ "^/[A-Za-z0-9_-]{3,32}$" {
            proxy_pass  http://backend;
        }

        # --- Everything else -> frontend (deep app paths, static, favicon) --
        location / {
            proxy_pass  http://frontend;
        }
    }

    # ---- HTTPS (enable after issuing a certificate) ------------------------
    # 1. Point a DNS A record at this host (no IPs in config; server_name _).
    # 2. Run certbot with the webroot above to write /etc/letsencrypt/... certs.
    # 3. Uncomment this block, set server_name to your domain, and reload.
    #
    # server {
    #     listen 443 ssl;
    #     listen [::]:443 ssl;
    #     http2 on;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #
    #     # ... paste the same proxy config, headers, and location blocks here ...
    # }
    #
    # And redirect plain HTTP to HTTPS by replacing the port-80 server's app
    # locations with:  return 301 https://$host$request_uri;
    # (keep the ACME challenge location on 80 so renewals work).
}
